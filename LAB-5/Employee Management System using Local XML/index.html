<!DOCTYPE html>
<html>
<head>
    <title>Employee Management System</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        table, th, td { border: 1px solid black; padding: 8px; }
        th { background-color: #f2f2f2; }
        input { margin: 5px; }
        button { margin: 5px; }
        #message { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<h2>Employee Management System (XML + AJAX)</h2>

<h3>Add / Update Employee</h3>
<input type="text" id="empId" placeholder="Employee ID">
<input type="text" id="empName" placeholder="Name">
<input type="text" id="empDept" placeholder="Department">
<input type="number" id="empSalary" placeholder="Salary">

<button onclick="addEmployee()">Add</button>
<button onclick="updateEmployee()">Update</button>
<button onclick="deleteEmployee()">Delete</button>

<div id="message"></div>

<h3>Employee Records</h3>
<table id="empTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>Salary</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
