<!DOCTYPE html>
<html>
<head>
    <title>Product Inventory System</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        table, th, td { border: 1px solid black; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
        input { margin: 5px; }
        button { margin: 5px; }
        .low-stock { background-color: #ffcccc; } /* Conditional formatting */
        #message { margin-top: 10px; font-weight: bold; }
        #totalValue { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<h2>Product Inventory System (JSON + Fetch)</h2>

<h3>Add / Edit Product</h3>
<input type="number" id="prodId" placeholder="Product ID">
<input type="text" id="prodName" placeholder="Name">
<input type="text" id="prodCategory" placeholder="Category">
<input type="number" id="prodPrice" placeholder="Price">
<input type="number" id="prodStock" placeholder="Stock Quantity">

<button onclick="addProduct()">Add</button>
<button onclick="updateProduct()">Update</button>
<button onclick="deleteProduct()">Delete</button>

<h3>Search by Category</h3>
<input type="text" id="searchCategory" placeholder="Enter Category">
<button onclick="searchCategory()">Search</button>
<button onclick="displayProducts()">Reset</button>

<div id="message"></div>

<h3>Inventory List</h3>
<table id="inventoryTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Total Value</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<div id="totalValue"></div>

<script src="script.js"></script>

</body>
</html>
