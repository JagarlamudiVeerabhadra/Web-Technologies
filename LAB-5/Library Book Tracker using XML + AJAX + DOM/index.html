<!DOCTYPE html>
<html>
<head>
    <title>Library Book Tracker</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        table, th, td { border: 1px solid black; padding: 8px; }
        th { background-color: #f2f2f2; }
        input, select { margin: 5px; }
        button { margin: 5px; }
        #message { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<h2>Library Book Tracker (XML + AJAX)</h2>

<h3>Add / Update Book</h3>
<input type="text" id="bookId" placeholder="Book ID">
<input type="text" id="bookTitle" placeholder="Title">
<input type="text" id="bookAuthor" placeholder="Author">
<select id="bookStatus">
    <option value="">Select Status</option>
    <option value="Available">Available</option>
    <option value="Issued">Issued</option>
</select>

<button onclick="addBook()">Add</button>
<button onclick="updateBook()">Update Status</button>
<button onclick="deleteBook()">Delete</button>

<div id="message"></div>

<h3>Book List</h3>
<table id="bookTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
