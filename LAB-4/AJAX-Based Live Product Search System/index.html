<!DOCTYPE html>
<html>
<head>
    <title>Live Product Search</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #111827;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }

        .container {
            width: 700px;
            background: #1f2937;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        #searchInput {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 50px;
            border: none;
            outline: none;
            background: #374151;
            color: #fff;
            transition: 0.3s ease;
        }

        #searchInput::placeholder {
            color: #9ca3af;
        }

        #searchInput:focus {
            background: #4b5563;
            box-shadow: 0 0 10px #3b82f6;
        }

        #status {
            margin-top: 15px;
            font-weight: 500;
        }

        .loading {
            color: #3b82f6;
        }

        .error {
            color: #ef4444;
        }

        #results {
            margin-top: 25px;
        }

        .product {
            background: #374151;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .product:hover {
            transform: scale(1.03);
            border: 1px solid #3b82f6;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        .product h3 {
            margin-bottom: 8px;
            font-weight: 500;
            color: #fff;
        }

        .product p {
            color: #d1d5db;
            font-size: 14px;
        }

        .no-results {
            text-align: center;
            color: #9ca3af;
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Live Product Search</h2>

    <input type="text" id="searchInput" placeholder="Search products...">
    <p id="status"></p>

    <div id="results"></div>

</div>
<script src="script.js"></script>

</body>
</html>
